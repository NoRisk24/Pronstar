<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e9ecef;
            padding-top: 30px; 
        }

        /* সাধারণ RGB টেক্সট এনিমেশন */
        @keyframes colorShift {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* বাটন এনিমেশন: মাঝখান থেকে দুই দিকে চলে যাবে */
        @keyframes flowOutward {
            0% {
                background-size: 100% 100%;
            }
            100% {
                background-size: 600% 100%; /* রঙগুলো বড় হয়ে বাইরের দিকে মিলিয়ে যাবে */
            }
        }

        .rgb-text {
            background: linear-gradient(to right, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: colorShift 3s linear infinite;
            display: inline-block;
            font-weight: bold;
        }

        .developer-name {
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 20px; 
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 95%;
            max-width: 420px;
            margin-bottom: 10px;
        }

        .side-info {
            flex: 1;
            font-weight: 700;
            color: #444;
            text-align: center;
        }

        /* লোগো RGB বর্ডার */
        .logo-img {
            width: 140px; height: 140px;
            border-radius: 50%;
            object-fit: cover;
            padding: 5px;
            background: linear-gradient(to right, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 200% auto;
            animation: colorShift 3s linear infinite;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 350px;
            margin-top: -40px; 
            padding-top: 55px;
            margin-bottom: 30px;
        }

        .visitor-info {
            background: #f1f4f8;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 13px;
            color: #555;
            border: 1px solid #d1d9e6;
        }

        h2 { margin-bottom: 20px; font-size: 20px; }

        /* বাটন স্টাইল: মাঝখান থেকে দুই দিকে শুধু চলে যাবে */
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 13px; margin: 12px 0;
            text-decoration: none; color: white; font-weight: bold;
            border-radius: 12px; transition: all 0.3s ease; font-size: 16px;
            position: relative;
            overflow: hidden;
            border: none;

            /* মিরর গ্রেডিয়েন্ট (Mirror Gradient) */
            background: linear-gradient(to right, 
                #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8,
                #ff0000, /* মাঝখানের পয়েন্ট */
                #ff00c8, #7a00ff, #002bff, #00ffd5, #48ff00, #fffb00, #ff7300, #ff0000);
            
            background-position: center;
            background-size: 100% 100%;
            animation: flowOutward 4s linear infinite; /* লুপ আকারে চলতেই থাকবে */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .link-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

    </style>
</head>
<body>

<div class="developer-name rgb-text">Developer Sajib</div>

<div class="header-wrapper">
    <div class="side-info">
        <div id="time-display" class="rgb-text" style="font-size: 16px;">00:00:00 AM</div><br>
        <small>TIME</small>
    </div>

    <img src="https://d.top4top.io/p_3744hq3y40.png" alt="Profile Logo" class="logo-img">

    <div class="side-info">
        <div id="date-display" class="rgb-text" style="font-size: 14px;">Date</div><br>
        <small>DATE</small>
    </div>
</div>

<div class="container">
    
    <div class="visitor-info">
        <div>IP Address: <span id="ip-address" class="rgb-text">Fetching...</span></div>
        <div>Location: <span id="country-name" class="rgb-text">Fetching...</span></div>
    </div>

    <h2 class="rgb-text">BEST PRON SITE</h2>
    
    <a href="https://xhamster.desi/creators/comatozze" target="_blank" class="link-btn">
        <i class="fab fa-youtube"></i> YouTube
    </a>
    <a href="https://www.freeporncave.com/tag/russian" target="_blank" class="link-btn">
        <i class="fab fa-google"></i> Google
    </a>
    <a href="https://bustybus.com/videos/hd-porn/" target="_blank" class="link-btn">
        <i class="fab fa-tiktok"></i> TikTok
    </a>
    <a href="https://www.eporner.com/" target="_blank" class="link-btn">
        <i class="fab fa-facebook"></i> Facebook
    </a>
    <a href="https://bustybus.com/pornstar/dani-daniels/?&region=4" target="_blank" class="link-btn">
        <i class="fas fa-comment-dots"></i> Imo
    </a>
    <a href="https://www.xnxx.com/best/2026-03" target="_blank" class="link-btn">
        <i class="fab fa-facebook-messenger"></i> Messenger
    </a>
</div>

<script>
    function updateDateTime() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12; 
        document.getElementById('time-display').textContent = `${hours}:${minutes}:${seconds} ${ampm}`;

        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('date-display').textContent = `${now.getDate()} ${monthNames[now.getMonth()]}`;
    }

    async function getVisitorDetails() {
        try {
            const response = await fetch('https://api.ipapi.is/');
            const data = await response.json();
            document.getElementById('ip-address').textContent = data.ip;
            document.getElementById('country-name').textContent = data.location.country + " (" + data.location.city + ")";
        } catch (error) {
            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('ip-address').textContent = data.ip;
                    document.getElementById('country-name').textContent = data.country_name;
                })
                .catch(() => {
                    document.getElementById('ip-address').textContent = "Not Found";
                    document.getElementById('country-name').textContent = "Unknown";
                });
        }
    }

    setInterval(updateDateTime, 1000);
    updateDateTime();
    getVisitorDetails();
</script>

</body>
</html>
