<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e9ecef;
            padding-top: 30px; 
        }

        /* পাসওয়ার্ড স্ক্রিন স্টাইল */
        #password-overlay, #link-password-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #link-password-overlay {
            display: none; 
            background-color: rgba(233, 236, 239, 0.98);
        }

        .pass-container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 320px;
        }

        .pass-input {
            width: 90%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            text-align: center;
        }

        /* ব্যাক বাটন RGB স্টাইল */
        .back-btn {
            display: inline-block;
            padding: 10px 25px;
            margin-top: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-size: 14px;
            border: none;
            cursor: pointer;
            background: linear-gradient(to right, 
                #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 200% auto;
            animation: colorShift 3s linear infinite;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* মূল কন্টেন্ট */
        #main-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        @keyframes colorShift {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        @keyframes flowOutward {
            0% { background-size: 100% 100%; }
            100% { background-size: 600% 100%; }
        }

        .rgb-text {
            background: linear-gradient(to right, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: colorShift 3s linear infinite;
            display: inline-block;
            font-weight: bold;
        }

        .developer-name {
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 20px; 
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 95%;
            max-width: 420px;
            margin-bottom: 10px;
        }

        .side-info {
            flex: 1;
            font-weight: 700;
            color: #444;
            text-align: center;
        }

        .logo-img {
            width: 140px; height: 140px;
            border-radius: 50%;
            object-fit: cover;
            padding: 5px;
            background: linear-gradient(to right, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 200% auto;
            animation: colorShift 3s linear infinite;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 350px;
            margin-top: -40px; 
            padding-top: 55px;
            margin-bottom: 30px;
        }

        .visitor-info {
            background: #f1f4f8;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 13px;
            color: #555;
            border: 1px solid #d1d9e6;
        }

        h2 { margin-bottom: 20px; font-size: 20px; }

        .link-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 13px; margin: 12px 0;
            text-decoration: none; color: white; font-weight: bold;
            border-radius: 12px; transition: all 0.3s ease; font-size: 16px;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            width: 100%;
            background: linear-gradient(to right, 
                #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8,
                #ff0000, #ff00c8, #7a00ff, #002bff, #00ffd5, #48ff00, #fffb00, #ff7300, #ff0000);
            background-position: center;
            background-size: 100% 100%;
            animation: flowOutward 4s linear infinite;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .link-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

<!-- মূল পাসওয়ার্ড স্ক্রিন (112233) -->
<div id="password-overlay">
    <div class="pass-container">
        <h2 class="rgb-text">ACCESS LOCKED</h2>
        <input type="password" id="pass-input" class="pass-input" placeholder="Enter Password">
        <button onclick="checkPassword()" class="link-btn">UNLOCK</button>
        
        <!-- শুধুমাত্র এই লিঙ্কটি যোগ করা হয়েছে -->
        <a href="https://www.facebook.com/share/1BNAgaAK9c/" target="_blank" class="rgb-text" style="text-decoration:none; display:block; margin-top:15px; font-size:14px;">Contact Admin</a>

        <p id="err-msg" style="color: red; font-size: 12px; margin-top: 10px; display: none;">Wrong Password! Try Again.</p>
    </div>
</div>

<!-- লিঙ্ক পাসওয়ার্ড স্ক্রিন (ব্যাক বাটন সহ) -->
<div id="link-password-overlay">
    <div class="pass-container">
        <h2 class="rgb-text">ACCESS LOCKED</h2>
        <input type="password" id="link-pass-input" class="pass-input" placeholder="Enter Password">
        <button onclick="checkLinkPassword()" class="link-btn">UNLOCK</button>
        <p id="link-err-msg" style="color: red; font-size: 12px; margin-top: 10px; display: none;">Wrong Password! Try Again.</p>
        <button onclick="closeLinkOverlay()" class="back-btn">BACK</button>
    </div>
</div>

<!-- মেইন কন্টেন্ট এলাকা -->
<div id="main-content">
    <div class="developer-name rgb-text">Developer Sajib</div>

    <div class="header-wrapper">
        <!-- বাম পাশে অনেক বড় করে Facebook.com (মার্ক করা জায়গায়) -->
        <div class="side-info" style="align-self: flex-start; padding-top: 10px;">
            <a href="https://www.facebook.com/share/1BNAgaAK9c/" target="_blank" style="text-decoration:none; font-size: 18px; display: block;" class="rgb-text">ADMIN FB ID</a>
        </div>

        <img src="https://d.top4top.io/p_3744hq3y40.png" alt="Profile Logo" class="logo-img">

        <!-- ডান পাশে Time এবং Date পর পর -->
        <div class="side-info">
            <div id="time-display" class="rgb-text" style="font-size: 18px;">00:00:00 AM</div><br>
            <small>TIME</small>
            
            <div style="margin-top: 15px;"></div> 
            
            <div id="date-display" class="rgb-text" style="font-size: 15px;">Date</div><br>
            <small>DATE</small>
        </div>
    </div>

    <div class="container">
        <div class="visitor-info">
            <div>IP Address: <span id="ip-address" class="rgb-text">Fetching...</span></div>
            <div>Location: <span id="country-name" class="rgb-text">Fetching...</span></div>
        </div>

        <h2 class="rgb-text">BEST PRON SITE</h2>
        
        <a href="javascript:void(0)" onclick="openSecureLink('https://xhamster.desi/creators/comatozze')" class="link-btn">
            <i class="fab fa-youtube"></i> YouTube
        </a>
        <a href="javascript:void(0)" onclick="openSecureLink('https://www.freeporncave.com/tag/russian')" class="link-btn">
            <i class="fab fa-google"></i> Google
        </a>
        <a href="javascript:void(0)" onclick="openSecureLink('https://bustybus.com/videos/hd-porn/')" class="link-btn">
            <i class="fab fa-tiktok"></i> TikTok
        </a>
        <a href="javascript:void(0)" onclick="openSecureLink('https://www.eporner.com/')" class="link-btn">
            <i class="fab fa-facebook"></i> Facebook
        </a>
        <a href="javascript:void(0)" onclick="openSecureLink('https://bustybus.com/pornstar/dani-daniels/?&region=4')" class="link-btn">
            <i class="fas fa-comment-dots"></i> Imo
        </a>
        <a href="javascript:void(0)" onclick="openSecureLink('https://www.xnxx.com/best/2026-03')" class="link-btn">
            <i class="fab fa-facebook-messenger"></i> Messenger
        </a>
    </div>
</div>

<script>
    let currentPendingUrl = "";

    // মেইন পাসওয়ার্ড চেক (112233)
    function checkPassword() {
        const input = document.getElementById('pass-input').value;
        const correctPass = "112233"; 

        if (input === correctPass) {
            document.getElementById('password-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
        } else {
            document.getElementById('err-msg').style.display = 'block';
            document.getElementById('pass-input').value = "";
        }
    }

    // লিঙ্কে ক্লিক করলে এই ফাংশন চলবে
    function openSecureLink(url) {
        currentPendingUrl = url;
        document.getElementById('link-password-overlay').style.display = 'flex';
        document.getElementById('link-pass-input').value = "";
        document.getElementById('link-err-msg').style.display = 'none';
    }

    // লিঙ্কের পাসওয়ার্ড চেক (1234)
    function checkLinkPassword() {
        const input = document.getElementById('link-pass-input').value;
        const correctPass = "1234";

        if (input === correctPass) {
            document.getElementById('link-password-overlay').style.display = 'none';
            window.open(currentPendingUrl, '_blank');
        } else {
            document.getElementById('link-err-msg').style.display = 'block';
            document.getElementById('link-pass-input').value = "";
        }
    }

    // ব্যাক বাটনের ফাংশন
    function closeLinkOverlay() {
        document.getElementById('link-password-overlay').style.display = 'none';
    }

    // টাইম এবং ডেট কোড
    function updateDateTime() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12; 
        document.getElementById('time-display').textContent = `${hours}:${minutes}:${seconds} ${ampm}`;

        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('date-display').textContent = `${now.getDate()} ${monthNames[now.getMonth()]}`;
    }

    async function getVisitorDetails() {
        try {
            const response = await fetch('https://api.ipapi.is/');
            const data = await response.json();
            document.getElementById('ip-address').textContent = data.ip;
            document.getElementById('country-name').textContent = data.location.country + " (" + data.location.city + ")";
        } catch (error) {
            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('ip-address').textContent = data.ip;
                    document.getElementById('country-name').textContent = data.country_name;
                })
                .catch(() => {
                    document.getElementById('ip-address').textContent = "Not Found";
                    document.getElementById('country-name').textContent = "Unknown";
                });
        }
    }

    setInterval(updateDateTime, 1000);
    updateDateTime();
    getVisitorDetails();
</script>

</body>
</html>
